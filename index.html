<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eisenhower Matrix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-container" class="auth-container">
        <header>
            <h1>Matrix Login</h1>
        </header>
        <div class="auth-forms">
            <form id="login-form">
                <h2>Sign In</h2>
                <input type="email" id="login-email" placeholder="EMAIL" required>
                <input type="password" id="login-password" placeholder="PASSWORD" required>
                <button type="submit">LOG IN</button>
            </form>
            <div class="auth-divider">OR</div>
            <form id="signup-form">
                <h2>Create Account</h2>
                <input type="email" id="signup-email" placeholder="EMAIL" required>
                <input type="password" id="signup-password" placeholder="PASSWORD" required>
                <button type="submit">SIGN UP</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="app-container" style="display: none;">
        <header>
            <div class="header-main">
                <div>
                    <h1>Eisenhower Matrix</h1>
                    <div id="user-email" class="user-email"></div>
                </div>
                <div class="header-actions">
                    <div id="sync-status" class="connecting">OFFLINE</div>
                    <button id="logout-btn" class="logout-btn">LOGOUT</button>
                </div>
            </div>
            <form id="add-task-form">
                <input type="text" id="task-title" placeholder="ENTER NEW TASK..." required>
                <select id="task-quadrant">
                    <option value="urgent_important">URGENT & IMPORTANT</option>
                    <option value="not_urgent_important">IMPORTANT (NOT URGENT)</option>
                    <option value="urgent_not_important">URGENT (NOT IMPORTANT)</option>
                    <option value="not_urgent_not_important" selected>NEITHER</option>
                </select>
                <button type="submit">ADD TASK</button>
            </form>
        </header>

        <div class="matrix-container">
            <div class="axis-label urgent">URGENT</div>
            <div class="axis-label important">IMPORTANT</div>
            
            <main class="matrix-grid">
                <div class="quadrant urgent-important" data-id="urgent_important">
                    <h2>DO NOW</h2>
                    <div class="task-list"></div>
                </div>
                <div class="quadrant not-urgent-important" data-id="not_urgent_important">
                    <h2>SCHEDULE</h2>
                    <div class="task-list"></div>
                </div>
                <div class="quadrant urgent-not-important" data-id="urgent_not_important">
                    <h2>DELEGATE</h2>
                    <div class="task-list"></div>
                </div>
                <div class="quadrant not-urgent-not-important" data-id="not_urgent_not_important">
                    <h2>ELIMINATE</h2>
                    <div class="task-list"></div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
